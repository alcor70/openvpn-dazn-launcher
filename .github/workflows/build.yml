name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Generate missing resources
      run: |
        mkdir -p app/src/main/res/drawable app/src/main/res/values app/src/main/res/xml
        cat << 'EOF' > app/src/main/res/drawable/ic_launcher.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#FF000000" android:pathData="M54,54m-50,0a50,50 0,1 1,100 0a50,50 0,1 1,-100 0"/></vector>
        EOF
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources><string name="app_name">VPN &amp; DAZN Launcher</string></resources>
        EOF
        cat << 'EOF' > app/src/main/res/xml/provider_paths.xml
        <?xml version="1.0" encoding="utf-8"?><paths><cache-path name="shared" path="." /></paths>
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openvpn2dazn-launcher-apk
        path: app/build/outputs/apk/debug/app-debug.apk
